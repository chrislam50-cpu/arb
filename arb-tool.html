<body class="bg-neutral-950 text-neutral-100">
<div id="loader">LOADING...</div>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useMemo, useEffect } = React;

function ArbTool() {
  const [maxBet, setMaxBet] = useState('200');
  const [oddMain, setOddMain] = useState('2.00');
  const [oddH1, setOddH1] = useState('4.75');
  const [oddH2, setOddH2] = useState('');
  const [oddH3, setOddH3] = useState('');
  const [exposureSlider, setExposureSlider] = useState(0);
  const [roundStep, setRoundStep] = useState(5);
  const [camoOdd1, setCamoOdd1] = useState('');
  const [camoOdd2, setCamoOdd2] = useState('');

  const roundTo = (val, step) => Math.round(val / step) * step;

  const calc = useMemo(() => {
    const oM = parseFloat(oddMain) || 0;
    const mB = parseFloat(maxBet) || 0;
    const oH1 = parseFloat(oddH1) || 0;
    const oH2 = parseFloat(oddH2) || 0;
    const oH3 = parseFloat(oddH3) || 0;
    const hedgeOdds = [oH1, oH2, oH3].filter(o => o > 1);

    if (oM <= 1 || mB <= 0 || hedgeOdds.length === 0) return null;

    const margin = (1 / oM) + hedgeOdds.reduce((s, o) => s + 1 / o, 0);
    const maxExposure = mB * oM * margin;
    const E_eff = Math.min(Math.max(exposureSlider, 0), maxExposure);

    const R = E_eff / margin;
    const sMain_opt = R / oM;
    const sHedge_opts = hedgeOdds.map(o => R / o);

    const sMain = Math.min(mB, Math.max(roundStep, roundTo(sMain_opt, roundStep)));
    const sHedges = sHedge_opts.map(opt => Math.max(roundStep, roundTo(opt, roundStep)));

    const total = sMain + sHedges.reduce((a, b) => a + b, 0);
    const allOdds = [oM, ...hedgeOdds];
    const allStakes = [sMain, ...sHedges];
    const profits = allOdds.map((odd, i) => allStakes[i] * odd - total);

    const pMin = Math.min(...profits);
    const pMax = Math.max(...profits);
    const ok = pMin > 0;
    const roi = total > 0 ? (pMin / total) * 100 : 0;

    return {
      sMain, sHedges, sMain_opt, sHedge_opts,
      total, profits, pMin, pMax, ok, roi,
      allOdds, allStakes, E_eff, maxExposure, margin, hedgeOdds
    };
  }, [oddMain, maxBet, oddH1, oddH2, oddH3, exposureSlider, roundStep]);

  const isValid = !!calc;
  const sliderMax = calc ? Math.ceil(calc.maxExposure / 50) * 50 : 0;
  const maxExp = calc ? calc.maxExposure : 0;
  const E_eff = calc ? calc.E_eff : 0;

  // Camouflage analysis (applies to Hedge 1)
  const camo = useMemo(() => {
    if (!calc) return null;
    const C1 = parseFloat(camoOdd1) || 0;
    const C2 = parseFloat(camoOdd2) || 0;
    const camoOdds = [C1, C2].filter(c => c > 1);
    if (camoOdds.length === 0) return null;

    // Combined camo (independence assumption)
    const combinedOdd = camoOdds.reduce((p, c) => p * c, 1);
    const p_camo = 1 / combinedOdd;

    // Normalized outcome probabilities
    const margin = calc.margin;
    const probs = calc.allOdds.map(o => (1 / o) / margin);

    // Hedge 1 (index 1) is the combined bet with camo
    const i_camo = 1;
    const p_hedge = probs[i_camo];

    // EV calculation
    let ev = 0;
    calc.profits.forEach((profit, i) => {
      if (i === i_camo) {
        ev += probs[i] * p_camo * profit;
      } else {
        ev += probs[i] * profit;
      }
    });
    // Loss case: hedge outcome happens but camo fails
    ev += p_hedge * (1 - p_camo) * (-calc.total);

    // Pure EV (no camo failure)
    const evPure = calc.profits.reduce((sum, p, i) => sum + probs[i] * p, 0);

    // Breakeven camo probability
    const sum_others = calc.profits.reduce((sum, p, i) =>
      i === i_camo ? sum : sum + probs[i] * p, 0);
    const profit_camo_outcome = calc.profits[i_camo];
    const breakeven_prob = (p_hedge * calc.total - sum_others) /
      (p_hedge * (profit_camo_outcome + calc.total));
    const breakeven_odd = breakeven_prob > 0 ? 1 / breakeven_prob : Infinity;

    // Loss probability
    const lossProb = p_hedge * (1 - p_camo);

    // Verdict
    let verdict;
    if (ev > evPure * 0.5) verdict = { label: 'SAFE', color: 'emerald' };
    else if (ev > 0) verdict = { label: 'MARGINAL', color: 'amber' };
    else verdict = { label: 'TOO RISKY', color: 'rose' };

    return {
      p_camo, combinedOdd, ev, evPure,
      breakeven_prob, breakeven_odd, lossProb,
      verdict, nCamo: camoOdds.length
    };
  }, [calc, camoOdd1, camoOdd2]);

  // Auto-set slider to max when first becoming valid
  useEffect(() => {
    if (sliderMax > 0 && exposureSlider === 0) {
      setExposureSlider(sliderMax);
    }
  }, [sliderMax]);

  const verdict = useMemo(() => {
    if (!calc) return { label: '—', color: 'idle' };
    if (!calc.ok) return { label: 'NO ARB', color: 'rose' };
    if (calc.margin < 0.75) return { label: 'HUGE EDGE', color: 'purple' };
    if (calc.margin < 0.90) return { label: 'EXCELLENT', color: 'emerald' };
    if (calc.margin < 0.97) return { label: 'GREAT', color: 'emerald' };
    return { label: 'OK ARB', color: 'emerald' };
  }, [calc]);

  const colors = {
    emerald: { bg: 'bg-emerald-950/40', border: 'border-emerald-500', text: 'text-emerald-400', tag: 'bg-emerald-500 text-black' },
    rose: { bg: 'bg-rose-950/40', border: 'border-rose-500', text: 'text-rose-400', tag: 'bg-rose-500 text-white' },
    amber: { bg: 'bg-amber-950/40', border: 'border-amber-500', text: 'text-amber-400', tag: 'bg-amber-500 text-black' },
    purple: { bg: 'bg-purple-950/40', border: 'border-purple-500', text: 'text-purple-400', tag: 'bg-purple-500 text-white' },
    cyan: { bg: 'bg-cyan-950/40', border: 'border-cyan-500', text: 'text-cyan-400', tag: 'bg-cyan-500 text-black' },
    idle: { bg: 'bg-neutral-900', border: 'border-neutral-700', text: 'text-neutral-400', tag: 'bg-neutral-700 text-neutral-300' }
  };
  const vc = colors[verdict.color];
  const camoVc = camo ? colors[camo.verdict.color] : colors.idle;

  return (
    <div className="min-h-screen bg-neutral-950 text-neutral-100 font-mono pb-12">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Anton&display=swap');
        .font-display { font-family: 'Anton', sans-serif; letter-spacing: 0.05em; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
      `}</style>

      <header className="border-b border-neutral-800 bg-neutral-950 sticky top-0 z-10 backdrop-blur">
        <div className="px-4 py-3 flex items-baseline justify-between">
          <h1 className="font-display text-2xl tracking-widest">ARB_CHECK</h1>
          <div className="text-[10px] text-neutral-500 uppercase tracking-widest">arbitrage</div>
        </div>
      </header>

      {/* ENHANCED / MAIN */}
      <section className="px-4 py-4 border-b border-neutral-800">
        <div className="text-[10px] text-amber-500 uppercase tracking-widest mb-3">// enhanced (αναφορά)</div>
        <div className="grid grid-cols-2 gap-2">
          <Field label="Max bet" suffix="€">
            <input type="number" value={maxBet} onChange={e => setMaxBet(e.target.value)}
              className="w-full bg-transparent text-2xl font-bold outline-none text-amber-400" step="50" />
          </Field>
          <Field label="Απόδοση" suffix="@">
            <input type="number" value={oddMain} onChange={e => setOddMain(e.target.value)}
              className="w-full bg-transparent text-2xl font-bold outline-none text-amber-400" step="0.05" />
          </Field>
        </div>
      </section>

      {/* HEDGES */}
      <section className="px-4 py-4 border-b border-neutral-800">
        <div className="text-[10px] text-emerald-500 uppercase tracking-widest mb-3">// hedges (1-3)</div>
        <div className="grid grid-cols-3 gap-2">
          <Field label="Hedge 1" suffix="@">
            <input type="number" value={oddH1} onChange={e => setOddH1(e.target.value)}
              className="w-full bg-transparent text-xl font-bold outline-none text-emerald-400" step="0.05"
              placeholder="—" />
          </Field>
          <Field label="Hedge 2" suffix="@">
            <input type="number" value={oddH2} onChange={e => setOddH2(e.target.value)}
              className="w-full bg-transparent text-xl font-bold outline-none text-emerald-400" step="0.05"
              placeholder="—" />
          </Field>
          <Field label="Hedge 3" suffix="@">
            <input type="number" value={oddH3} onChange={e => setOddH3(e.target.value)}
              className="w-full bg-transparent text-xl font-bold outline-none text-emerald-400" step="0.05"
              placeholder="—" />
          </Field>
        </div>
        <div className="text-[10px] text-neutral-500 mt-2">
          Κενά πεδία αγνοούνται. Π.χ. για "Ο2.5 & GG", συμπλήρωσε και τα 3 hedges (Ο2.5+NG, U2.5+GG, U2.5+NG).
        </div>
      </section>

      {/* EXPOSURE SLIDER */}
      <section className="px-4 py-4 border-b border-neutral-800">
        <div className="text-[10px] text-sky-500 uppercase tracking-widest mb-3">// exposure</div>
        <div className={!isValid ? 'opacity-30 pointer-events-none select-none' : ''}>
          <div className="flex justify-between items-baseline mb-3">
            <span className="text-xs text-neutral-400">Επιλεγμένη έκθεση</span>
            <span className="font-display text-3xl text-sky-400">{E_eff.toFixed(0)}€</span>
          </div>
          <input type="range"
            min="0"
            max={Math.max(50, sliderMax)}
            step="50"
            value={Math.min(exposureSlider, Math.max(50, sliderMax))}
            onChange={e => setExposureSlider(parseFloat(e.target.value))}
            disabled={!isValid}
            className="w-full accent-sky-500"
            style={{ height: '6px' }} />
          <div className="flex justify-between items-center mt-2">
            <span className="text-[10px] text-neutral-500">0€</span>
            <button onClick={() => setExposureSlider(sliderMax)}
              disabled={!isValid}
              className="px-3 py-1 text-xs border border-sky-700 bg-sky-950/30 text-sky-400 font-bold">
              MAX · {maxExp.toFixed(0)}€
            </button>
          </div>
        </div>
        {!isValid && (
          <div className="text-[11px] text-rose-400 mt-2">
            Συμπλήρωσε max bet + απόδοση ενίσχυσης + τουλάχιστον 1 hedge.
          </div>
        )}
      </section>

      {/* VERDICT */}
      <section className="px-4 py-5">
        <div className={`border-2 ${vc.border} ${vc.bg} p-4`}>
          <div className="flex items-center justify-between mb-3">
            <span className={`px-2 py-1 text-[10px] font-bold tracking-widest ${vc.tag}`}>{verdict.label}</span>
            {calc && (
              <span className="text-[10px] text-neutral-500 uppercase tracking-widest">
                margin {(calc.margin * 100).toFixed(1)}% · {calc.allOdds.length}-way
              </span>
            )}
          </div>
          {calc ? (
            <>
              <div className={`font-display text-4xl mb-1 ${vc.text}`}>
                {calc.pMin >= 0 ? '+' : ''}{calc.pMin.toFixed(2)}€
              </div>
              <div className="text-sm text-neutral-300">
                Min profit · ROI {calc.roi >= 0 ? '+' : ''}{calc.roi.toFixed(1)}%
              </div>
            </>
          ) : (
            <div className="text-neutral-500">Συμπλήρωσε τα δεδομένα</div>
          )}
        </div>
      </section>

      {/* STAKES */}
      {calc && (
        <section className="px-4 pb-5">
          <div className="text-[10px] text-neutral-500 uppercase tracking-widest mb-3">// what to bet</div>
          <div className="space-y-2">
            <div className="border-2 border-amber-700 bg-amber-950/20 p-3 flex items-center justify-between">
              <div>
                <div className="text-[10px] text-amber-500 uppercase tracking-widest">Main @{calc.allOdds[0].toFixed(2)}</div>
                <div className="text-[10px] text-neutral-500">opt: {calc.sMain_opt.toFixed(2)}€</div>
              </div>
              <div className="font-display text-3xl text-amber-400">{calc.sMain}€</div>
            </div>
            {calc.sHedges.map((s, i) => (
              <div key={i} className="border border-emerald-700 bg-emerald-950/20 p-3 flex items-center justify-between">
                <div>
                  <div className="text-[10px] text-emerald-500 uppercase tracking-widest">Hedge {i + 1} @{calc.hedgeOdds[i].toFixed(2)}</div>
                  <div className="text-[10px] text-neutral-500">opt: {calc.sHedge_opts[i].toFixed(2)}€</div>
                </div>
                <div className="font-display text-2xl text-emerald-400">{s}€</div>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* OUTCOMES */}
      {calc && (
        <section className="px-4 pb-5">
          <div className="text-[10px] text-neutral-500 uppercase tracking-widest mb-3">// outcomes</div>
          <div className="border border-neutral-800 divide-y divide-neutral-800">
            {calc.profits.map((p, i) => {
              const label = i === 0 ? 'Main' : `Hedge ${i}`;
              return (
                <div key={i} className="flex items-center justify-between p-3">
                  <div>
                    <div className="text-xs">
                      Αν κερδίσει <span className="font-bold">{label}</span>
                    </div>
                    <div className="text-[10px] text-neutral-500">
                      {calc.allStakes[i]}€ × {calc.allOdds[i].toFixed(2)} = {(calc.allStakes[i] * calc.allOdds[i]).toFixed(2)}€
                    </div>
                  </div>
                  <div className={`font-display text-2xl ${p >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {p >= 0 ? '+' : ''}{p.toFixed(2)}€
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* CAMOUFLAGE CHECK */}
      {calc && (
        <section className="px-4 pb-5">
          <div className="text-[10px] text-cyan-500 uppercase tracking-widest mb-3">// camouflage check (optional)</div>
          <div className="border border-neutral-800 p-3 bg-neutral-900/30">
            <div className="text-[10px] text-neutral-500 mb-2">
              Αν το Hedge 1 είναι combined bet (π.χ. X2 + κόρνερ + σουτ), βάλε εδώ μόνο τις camouflage επιλογές (όχι το κύριο outcome).
            </div>
            <div className="grid grid-cols-2 gap-2">
              <Field label="Camo 1 odd" suffix="@">
                <input type="number" value={camoOdd1} onChange={e => setCamoOdd1(e.target.value)}
                  className="w-full bg-transparent text-xl font-bold outline-none text-cyan-400" step="0.05"
                  placeholder="—" />
              </Field>
              <Field label="Camo 2 odd" suffix="@">
                <input type="number" value={camoOdd2} onChange={e => setCamoOdd2(e.target.value)}
                  className="w-full bg-transparent text-xl font-bold outline-none text-cyan-400" step="0.05"
                  placeholder="—" />
              </Field>
            </div>
          </div>

          {camo && (
            <div className={`border-2 ${camoVc.border} ${camoVc.bg} p-4 mt-3`}>
              <div className="flex items-center justify-between mb-3">
                <span className={`px-2 py-1 text-[10px] font-bold tracking-widest ${camoVc.tag}`}>
                  {camo.verdict.label === 'SAFE' ? '✓ ' : camo.verdict.label === 'MARGINAL' ? '≈ ' : '✗ '}
                  {camo.verdict.label}
                </span>
                <span className="text-[10px] text-neutral-500 uppercase tracking-widest">
                  combined @{camo.combinedOdd.toFixed(2)}
                </span>
              </div>

              <div className="grid grid-cols-2 gap-3 mb-3">
                <div>
                  <div className="text-[10px] text-neutral-500 uppercase tracking-widest">Camo prob</div>
                  <div className="font-display text-2xl text-cyan-400">{(camo.p_camo * 100).toFixed(1)}%</div>
                </div>
                <div>
                  <div className="text-[10px] text-neutral-500 uppercase tracking-widest">Breakeven prob</div>
                  <div className="font-display text-2xl text-neutral-300">
                    {camo.breakeven_prob > 0 && camo.breakeven_prob < 1
                      ? `${(camo.breakeven_prob * 100).toFixed(1)}%`
                      : '—'}
                  </div>
                  {camo.breakeven_odd > 0 && camo.breakeven_odd < 100 && (
                    <div className="text-[10px] text-neutral-500">
                      = max @{camo.breakeven_odd.toFixed(2)}
                    </div>
                  )}
                </div>
              </div>

              <div className="border-t border-neutral-700 pt-3 space-y-1 text-sm">
                <div className="flex justify-between">
                  <span className="text-neutral-400">Adjusted EV (με camo risk):</span>
                  <span className={`font-bold ${camo.ev >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {camo.ev >= 0 ? '+' : ''}{camo.ev.toFixed(2)}€
                  </span>
                </div>
                <div className="flex justify-between">
                  <span className="text-neutral-400">Pure arb EV (χωρίς camo):</span>
                  <span className="font-bold text-emerald-400">+{camo.evPure.toFixed(2)}€</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-neutral-400">Loss probability:</span>
                  <span className="font-bold text-rose-400">{(camo.lossProb * 100).toFixed(1)}%</span>
                </div>
              </div>

              {camo.verdict.label === 'TOO RISKY' && (
                <div className="mt-3 text-[11px] text-rose-400">
                  ⚠ Το camouflage τρώει το edge. Χρειάζεσαι camo prob ≥ {(camo.breakeven_prob * 100).toFixed(0)}%
                  (max @{camo.breakeven_odd.toFixed(2)}).
                </div>
              )}
              {camo.verdict.label === 'MARGINAL' && (
                <div className="mt-3 text-[11px] text-amber-400">
                  ≈ Λίγο πάνω από breakeven. Σκέψου αν αξίζει το account safety vs τη μικρή EV.
                </div>
              )}
              {camo.verdict.label === 'SAFE' && (
                <div className="mt-3 text-[11px] text-emerald-400">
                  ✓ Το camouflage είναι ασφαλές. Διατηρεί &gt;50% του arb edge.
                </div>
              )}
            </div>
          )}
        </section>
      )}

      {/* STATS */}
      {calc && (
        <section className="px-4 pb-5">
          <div className="text-[10px] text-neutral-500 uppercase tracking-widest mb-3">// stats</div>
          <div className="grid grid-cols-2 gap-px bg-neutral-800 border border-neutral-800">
            <Stat label="Min profit" value={`${calc.pMin >= 0 ? '+' : ''}${calc.pMin.toFixed(2)}€`}
              accent={calc.pMin > 0 ? 'emerald' : 'rose'} />
            <Stat label="Max profit" value={`${calc.pMax >= 0 ? '+' : ''}${calc.pMax.toFixed(2)}€`}
              accent={calc.pMax > 0 ? 'emerald' : 'rose'} />
            <Stat label="Total exposure" value={`${calc.total.toFixed(2)}€`} />
            <Stat label="ROI (min)" value={`${calc.roi >= 0 ? '+' : ''}${calc.roi.toFixed(1)}%`}
              accent={calc.roi > 0 ? 'emerald' : 'rose'} />
            <Stat label="Margin" value={`${(calc.margin * 100).toFixed(1)}%`}
              accent={calc.margin < 1 ? 'emerald' : 'rose'} />
            <Stat label="Outcomes" value={`${calc.allOdds.length}-way`} />
          </div>
        </section>
      )}

      {/* ROUNDING */}
      <section className="px-4 py-3 border-t border-neutral-800 bg-neutral-900/30">
        <div className="flex items-center justify-between mb-2">
          <span className="text-[10px] text-neutral-500 uppercase tracking-widest">Στρογγυλοποίηση</span>
          <span className="text-[9px] text-amber-400">account safety</span>
        </div>
        <div className="grid grid-cols-4 gap-2">
          {[1, 5, 10, 20].map(s => (
            <button key={s} onClick={() => setRoundStep(s)}
              className={`py-1.5 border-2 transition text-sm font-bold ${
                roundStep === s ? 'border-amber-500 bg-amber-950/40 text-amber-400' : 'border-neutral-800 text-neutral-500'
              }`}>€{s}</button>
          ))}
        </div>
      </section>

      {/* MARGIN LEGEND */}
      <section className="px-4 py-3 text-[10px] text-neutral-500 space-y-1">
        <div className="uppercase tracking-widest text-neutral-400 mb-1">// margin = Σ(1/odd) όλων</div>
        <div>&lt; 75% = <span className="text-purple-400">HUGE EDGE</span> (συνήθως bonus/enhanced)</div>
        <div>75-90% = <span className="text-emerald-400">EXCELLENT</span> (10%+ profit)</div>
        <div>90-97% = <span className="text-emerald-400">GREAT</span> (3-10% profit)</div>
        <div>97-100% = <span className="text-emerald-400">OK ARB</span> (μικρό κέρδος)</div>
        <div>&gt; 100% = <span className="text-rose-400">NO ARB</span> (χάνεις)</div>
      </section>

      <footer className="px-4 pt-4 border-t border-neutral-800 text-[10px] text-neutral-600">
        Max exposure = maxBet × oddMain × margin · Balanced payout: stake_i = R / odd_i
      </footer>
    </div>
  );
}

function Field({ label, suffix, children }) {
  return (
    <div className="border border-neutral-800 p-2 bg-neutral-900/50">
      <div className="flex justify-between items-baseline mb-1">
        <span className="text-[9px] text-neutral-500 uppercase tracking-wider">{label}</span>
        <span className="text-[10px] text-neutral-600">{suffix}</span>
      </div>
      {children}
    </div>
  );
}

function Stat({ label, value, accent }) {
  const colors = { emerald: 'text-emerald-400', rose: 'text-rose-400', sky: 'text-sky-400' };
  return (
    <div className="bg-neutral-950 p-3">
      <div className="text-[9px] text-neutral-500 uppercase tracking-widest mb-1">{label}</div>
      <div className={`text-lg font-bold ${colors[accent] || 'text-neutral-100'}`}>{value}</div>
    </div>
  );
}


function App() {
  useEffect(() => {
    const loader = document.getElementById('loader');
    if (loader) {
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 300);
    }
  }, []);
  return <ArbTool />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
